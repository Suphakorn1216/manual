teleop_node:
  ros__parameters:
    # --- ส่วนสำคัญ: แก้ปัญหาไม่ Real-time และความเร็วไม่คงที่ ---
    autorepeat_rate: 20.0       # บังคับให้ส่งคำสั่งทุก 0.05 วินาที แม้จะถือจอยนิ่งๆ

    # --- การตั้งค่าปุ่มและแกนตามที่คุณต้องการ ---
    axis_linear.x: 1            # ก้านซ้าย (ขึ้น-ลง)
    scale_linear.x: 0.26        # ความเร็วสูงสุดของ Burger
    
    axis_angular.yaw: 2         # แกนเลี้ยวเดิมของคุณ
    scale_angular.yaw: 3.0      # ปรับลดลงมาหน่อยเพื่อให้การเลี้ยวไม่ไปดึงกำลังจากการเดินหน้ามากเกินไป
    
    enable_button: 7            # ปุ่ม RB ตามเดิมที่คุณต้องการ
    require_enable_button: true # ต้องกด RB ค้างไว้รถถึงจะวิ่ง
